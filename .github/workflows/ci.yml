name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_DEFAULT: "22.x"
  TF_VERSION: "2.18.1"

jobs:
  # ---------------------------------------------------------------------------
  # 0. Detect which packages changed
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      jude-map: ${{ steps.filter.outputs.jude-map }}
      jude-tf: ${{ steps.filter.outputs.jude-tf }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            jude-map:
              - 'jude-map/**'
              - '.changeset/**'
            jude-tf:
              - 'jude-tf/**'
              - '.changeset/**'
            ci:
              - '.github/workflows/**'

  # ---------------------------------------------------------------------------
  # 1. jude-map tests
  # ---------------------------------------------------------------------------
  test-jude-map:
    name: "jude-map / ${{ matrix.os }} / Node ${{ matrix.node }}"
    needs: changes
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    defaults:
      run:
        working-directory: jude-map
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["18.x", "20.x", "22.x"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache native build
        uses: actions/cache@v4
        with:
          path: jude-map/build/Release
          key: jude-map-${{ runner.os }}-${{ matrix.node }}-${{ hashFiles('jude-map/binding.gyp', 'jude-map/src/native/**') }}
          restore-keys: jude-map-${{ runner.os }}-${{ matrix.node }}-

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm ci --ignore-scripts

      - run: npm run build

      - name: Copy addon to src/build
        shell: bash
        run: mkdir -p src/build && cp build/Release/jude-map.node src/build/

      - run: npm test

  # ---------------------------------------------------------------------------
  # 2. jude-map prebuilds (main branch only)
  # ---------------------------------------------------------------------------
  prebuild-jude-map:
    name: "jude-map prebuild / ${{ matrix.os }}"
    needs: test-jude-map
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    defaults:
      run:
        working-directory: jude-map
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_DEFAULT }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm ci --ignore-scripts

      - run: npm run prebuildify

      - uses: actions/upload-artifact@v4
        with:
          name: jude-map-prebuilds-${{ matrix.os }}
          path: jude-map/prebuilds/
          retention-days: 90

  # ---------------------------------------------------------------------------
  # 3. Install libtensorflow (runs in parallel with jude-map tests)
  # ---------------------------------------------------------------------------
  install-libtensorflow:
    name: "libtensorflow / ${{ matrix.os }}"
    needs: changes
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Cache libtensorflow
        id: cache-tf
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/include/tensorflow
            /usr/local/lib/libtensorflow*
            C:\libtensorflow
          key: libtensorflow-${{ env.TF_VERSION }}-${{ runner.os }}

      - name: Install (Linux)
        if: runner.os == 'Linux' && steps.cache-tf.outputs.cache-hit != 'true'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-linux-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz
          sudo ldconfig

      - name: Install (macOS)
        if: runner.os == 'macOS' && steps.cache-tf.outputs.cache-hit != 'true'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-darwin-x86_64.tar.gz" \
            || wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-darwin-arm64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-darwin-*.tar.gz

      - name: Install (Windows)
        if: runner.os == 'Windows' && steps.cache-tf.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile libtf.zip
          Expand-Archive libtf.zip -DestinationPath C:\libtensorflow

  # ---------------------------------------------------------------------------
  # 4. jude-tf tests
  # ---------------------------------------------------------------------------
  test-jude-tf:
    name: "jude-tf / ${{ matrix.os }} / Node ${{ matrix.node }}"
    needs: [changes, install-libtensorflow]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    defaults:
      run:
        working-directory: jude-tf
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["18.x", "20.x", "22.x"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore libtensorflow
        id: cache-tf
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/include/tensorflow
            /usr/local/lib/libtensorflow*
            C:\libtensorflow
          key: libtensorflow-${{ env.TF_VERSION }}-${{ runner.os }}

      - name: Install libtensorflow (Linux)
        if: runner.os == 'Linux' && steps.cache-tf.outputs.cache-hit != 'true'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-linux-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz
          sudo ldconfig

      - name: Install libtensorflow (macOS)
        if: runner.os == 'macOS' && steps.cache-tf.outputs.cache-hit != 'true'
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            TF_ARCH="arm64"
          else
            TF_ARCH="x86_64"
          fi
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-darwin-${TF_ARCH}.tar.gz"
          sudo tar -C /usr/local -xzf "libtensorflow-cpu-darwin-${TF_ARCH}.tar.gz"

      - name: Install libtensorflow (Windows)
        if: runner.os == 'Windows' && steps.cache-tf.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile libtf.zip
          Expand-Archive libtf.zip -DestinationPath C:\libtensorflow

      - name: Set LIBTENSORFLOW_PATH (Linux / macOS)
        if: runner.os != 'Windows'
        run: echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV

      - name: Set LIBTENSORFLOW_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "LIBTENSORFLOW_PATH=C:\libtensorflow" >> $env:GITHUB_ENV
          echo "C:\libtensorflow\lib" >> $env:GITHUB_PATH

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install jude-map (peer dep)
        run: cd ../jude-map && npm ci --ignore-scripts && npm run build:ts

      - run: npm ci --ignore-scripts

      - run: npm run build

      - run: npm test

  # ---------------------------------------------------------------------------
  # 5. jude-tf prebuilds (main branch only)
  # ---------------------------------------------------------------------------
  prebuild-jude-tf:
    name: "jude-tf prebuild / ${{ matrix.os }}"
    needs: test-jude-tf
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 50
    defaults:
      run:
        working-directory: jude-tf
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_DEFAULT }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Restore libtensorflow
        id: cache-tf
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/include/tensorflow
            /usr/local/lib/libtensorflow*
            C:\libtensorflow
          key: libtensorflow-${{ env.TF_VERSION }}-${{ runner.os }}

      - name: Install libtensorflow (Linux)
        if: runner.os == 'Linux' && steps.cache-tf.outputs.cache-hit != 'true'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-linux-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz
          sudo ldconfig

      - name: Install libtensorflow (macOS)
        if: runner.os == 'macOS' && steps.cache-tf.outputs.cache-hit != 'true'
        run: |
          if [ "$(uname -m)" = "arm64" ]; then
            TF_ARCH="arm64"
          else
            TF_ARCH="x86_64"
          fi
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-darwin-${TF_ARCH}.tar.gz"
          sudo tar -C /usr/local -xzf "libtensorflow-cpu-darwin-${TF_ARCH}.tar.gz"

      - name: Install libtensorflow (Windows)
        if: runner.os == 'Windows' && steps.cache-tf.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile libtf.zip
          Expand-Archive libtf.zip -DestinationPath C:\libtensorflow

      - name: Set LIBTENSORFLOW_PATH (Linux / macOS)
        if: runner.os != 'Windows'
        run: echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV

      - name: Set LIBTENSORFLOW_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "LIBTENSORFLOW_PATH=C:\libtensorflow" >> $env:GITHUB_ENV
          echo "C:\libtensorflow\lib" >> $env:GITHUB_PATH

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm ci --ignore-scripts

      - run: npm run prebuildify

      - uses: actions/upload-artifact@v4
        with:
          name: jude-tf-prebuilds-${{ matrix.os }}
          path: jude-tf/prebuilds/
          retention-days: 90

  # ---------------------------------------------------------------------------
  # 6. Release via changesets (main only, after all prebuilds)
  # ---------------------------------------------------------------------------
  release:
    name: Release and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [prebuild-jude-map, prebuild-jude-tf]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      (needs.prebuild-jude-map.result == 'success' || needs.prebuild-jude-map.result == 'skipped') &&
      (needs.prebuild-jude-tf.result == 'success' || needs.prebuild-jude-tf.result == 'skipped')
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_DEFAULT }}
          registry-url: "https://registry.npmjs.org"

      - run: npm install -g npm@latest

      - run: npm ci --ignore-scripts

      - run: npm run build:ts
        working-directory: jude-map

      - run: npm run build:ts
        working-directory: jude-tf

      - name: Download jude-map prebuilds
        if: needs.prebuild-jude-map.result == 'success'
        uses: actions/download-artifact@v4
        with:
          pattern: jude-map-prebuilds-*
          path: jude-map/prebuilds/
          merge-multiple: true

      - name: Download jude-tf prebuilds
        if: needs.prebuild-jude-tf.result == 'success'
        uses: actions/download-artifact@v4
        with:
          pattern: jude-tf-prebuilds-*
          path: jude-tf/prebuilds/
          merge-multiple: true

      - name: Verify prebuilds
        run: |
          if [ -d jude-map/prebuilds ]; then echo "── jude-map ──" && ls jude-map/prebuilds/; else echo "jude-map prebuilds skipped"; fi
          if [ -d jude-tf/prebuilds ]; then echo "── jude-tf ──" && ls jude-tf/prebuilds/; else echo "jude-tf prebuilds skipped"; fi

      - uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run publish-packages
          commit: "ci(release): version packages"
          title: "ci(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  # ---------------------------------------------------------------------------
  # 7. Lint and type-check (always runs)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_DEFAULT }}

      - name: Type-check jude-map
        working-directory: jude-map
        run: npm ci --ignore-scripts && npx tsc --noEmit
        continue-on-error: true

      - name: Type-check jude-tf
        working-directory: jude-tf
        run: npm ci --ignore-scripts && npx tsc --noEmit
        continue-on-error: true
