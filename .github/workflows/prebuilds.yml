name: Prebuilds

on:
  push:
    tags:
      - "jude-map@*"
      - "jude-tf@*"
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Which package to build prebuilds for"
        required: true
        type: choice
        options: [jude-map, jude-tf, both]

env:
  TF_VERSION: "2.18.1"

jobs:
  # ---------------------------------------------------------------------------
  # jude-map prebuilds
  # ---------------------------------------------------------------------------
  prebuild-jude-map:
    name: "jude-map / ${{ matrix.os }} (${{ matrix.arch }})"
    if: |
      startsWith(github.ref, 'refs/tags/jude-map@') ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.package == 'jude-map' ||
      github.event.inputs.package == 'both'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: jude-map
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-13
            arch: x64
          - os: macos-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - run: npm ci

      - run: npm run build:ts

      - run: npm run prebuildify

      - uses: actions/upload-artifact@v4
        with:
          name: jude-map-prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: jude-map/prebuilds/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # jude-tf prebuilds
  # ---------------------------------------------------------------------------
  prebuild-jude-tf:
    name: "jude-tf / ${{ matrix.os }} (${{ matrix.arch }})"
    if: |
      startsWith(github.ref, 'refs/tags/jude-tf@') ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.package == 'jude-tf' ||
      github.event.inputs.package == 'both'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: jude-tf
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
          - os: windows-latest
            arch: x64
          - os: macos-13
            arch: x64
          - os: macos-latest
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3

      - name: Install libtensorflow (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-linux-x86_64.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-linux-x86_64.tar.gz
          sudo ldconfig
          echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV

      - name: Install libtensorflow (macOS)
        if: runner.os == 'macOS'
        run: |
          wget -q "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-darwin-${{ matrix.arch }}.tar.gz"
          sudo tar -C /usr/local -xzf libtensorflow-cpu-darwin-${{ matrix.arch }}.tar.gz
          echo "LIBTENSORFLOW_PATH=/usr/local" >> $GITHUB_ENV

      - name: Install libtensorflow (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $url = "https://storage.googleapis.com/tensorflow/versions/${{ env.TF_VERSION }}/libtensorflow-cpu-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile libtf.zip
          Expand-Archive libtf.zip -DestinationPath C:\libtensorflow
          echo "LIBTENSORFLOW_PATH=C:\libtensorflow" >> $env:GITHUB_ENV
          echo "C:\libtensorflow\lib" >> $env:GITHUB_PATH

      - run: npm ci

      - run: npm run build:ts

      - run: npm run prebuildify

      - uses: actions/upload-artifact@v4
        with:
          name: jude-tf-prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: jude-tf/prebuilds/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Collect all prebuilds and create a GitHub release
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [prebuild-jude-map, prebuild-jude-tf]
    if: |
      always() &&
      (needs.prebuild-jude-map.result == 'success' || needs.prebuild-jude-map.result == 'skipped') &&
      (needs.prebuild-jude-tf.result == 'success'  || needs.prebuild-jude-tf.result == 'skipped') &&
      startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Organise prebuilds
        run: |
          mkdir -p jude-map/prebuilds jude-tf/prebuilds
          find artifacts -path '*/jude-map-prebuilds-*/*.node' -exec cp {} jude-map/prebuilds/ \;
          find artifacts -path '*/jude-tf-prebuilds-*/*.node'  -exec cp {} jude-tf/prebuilds/ \;
          echo "── jude-map ──" && ls jude-map/prebuilds/
          echo "── jude-tf ──"  && ls jude-tf/prebuilds/

      - uses: softprops/action-gh-release@v1
        with:
          files: |
            jude-map/prebuilds/**/*.node
            jude-tf/prebuilds/**/*.node
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
